name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    secrets:
      OPENROUTER_API_KEY:
        required: false
        description: 'OpenRouter API key (preferred backend; falls back to CLAUDE_CODE_OAUTH_TOKEN if unset)'
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
        description: 'Claude Code OAuth token (fallback when OPENROUTER_API_KEY is not set)'
      PROTO_REPO_TOKEN:
        required: false
        description: 'GitHub token with read access to the proto repo (required if proto_repo is private)'
    inputs:
      script_repo:
        required: false
        type: string
        default: 'wck0/aip-compliance-checker'
        description: 'Repository containing the claude_review.py script (owner/repo format)'
      script_ref:
        required: false
        type: string
        default: 'main'
        description: 'Branch/tag/ref to download the script from'
      proto_repo:
        required: false
        type: string
        default: 'canonical/landscape-proto'
        description: 'Repository containing proto definitions used as context for the AIP review (owner/repo format)'
      openrouter_model:
        required: false
        type: string
        default: 'google/gemma-4-31b-it'
        description: 'OpenRouter model slug. Examples: google/gemma-4-31b-it, openai/gpt-5.1-codex-max, google/gemini-2.5-pro'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install anthropic openai PyGithub
      
      - name: Download Claude review script and skill
        run: |
          mkdir -p .github/scripts
          mkdir -p .claude/skills/aip-review
          echo "📥 Downloading claude_review.py from ${{ inputs.script_repo }}@${{ inputs.script_ref }}"
          curl -L -o .github/scripts/claude_review.py \
            "https://raw.githubusercontent.com/${{ inputs.script_repo }}/${{ inputs.script_ref }}/.github/scripts/claude_review.py"
          chmod +x .github/scripts/claude_review.py
          echo "📚 Downloading aip-review skill from ${{ inputs.script_repo }}@${{ inputs.script_ref }}"
          curl -L -o .claude/skills/aip-review/SKILL.md \
            "https://raw.githubusercontent.com/${{ inputs.script_repo }}/${{ inputs.script_ref }}/.claude/skills/aip-review/SKILL.md"

      - name: Resolve proto repo branch
        id: proto
        env:
          PROTO_REPO: ${{ inputs.proto_repo || 'david-mclain/landscape-proto' }}
          HEAD_REF: ${{ github.head_ref }}
          PROTO_REPO_TOKEN: ${{ secrets.PROTO_REPO_TOKEN }}
        run: |
          PREFIX=$(echo "$HEAD_REF" | grep -oE '^lndeng-[0-9]+' || true)
          PROTO_BRANCH=""
          if [ -n "$PREFIX" ]; then
            echo "🔎 Looking for branch starting with '$PREFIX' in $PROTO_REPO"
            PROTO_REMOTE_URL="https://github.com/${PROTO_REPO}.git"
            if [ -n "$PROTO_REPO_TOKEN" ]; then
              PROTO_REMOTE_URL="https://x-access-token:${PROTO_REPO_TOKEN}@github.com/${PROTO_REPO}.git"
            fi
            PROTO_BRANCH=$(git ls-remote --heads "$PROTO_REMOTE_URL" "${PREFIX}*" \
              | head -n 1 | awk '{print $2}' | sed 's|refs/heads/||')
          fi
          if [ -z "$PROTO_BRANCH" ]; then
            echo "ℹ️  No matching branch in proto repo; defaulting to main"
            PROTO_BRANCH="main"
          else
            echo "✅ Matched proto branch: $PROTO_BRANCH"
          fi
          echo "proto_repo=$PROTO_REPO" >> "$GITHUB_OUTPUT"
          echo "proto_ref=$PROTO_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout proto repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.proto.outputs.proto_repo }}
          ref: ${{ steps.proto.outputs.proto_ref }}
          path: .proto-context
          token: ${{ secrets.PROTO_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Review PR with Claude
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ inputs.openrouter_model }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PROTO_REPO: ${{ steps.proto.outputs.proto_repo }}
          PROTO_REF: ${{ steps.proto.outputs.proto_ref }}
          PROTO_CONTEXT_PATH: .proto-context
        run: python .github/scripts/claude_review.py
