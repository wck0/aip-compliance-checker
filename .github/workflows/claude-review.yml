name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
        description: 'Anthropic API key for Claude access'
    inputs:
      script_repo:
        required: false
        type: string
        default: 'wck0/aip-compliance-checker'
        description: 'Repository containing the claude_review.py script (owner/repo format)'
      script_ref:
        required: false
        type: string
        default: 'main'
        description: 'Branch/tag/ref to download the script from'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install anthropic PyGithub
      
      - name: Download Claude review script and skill
        run: |
          mkdir -p .github/scripts
          mkdir -p .claude/skills/aip-review
          echo "📥 Downloading claude_review.py from ${{ inputs.script_repo }}@${{ inputs.script_ref }}"
          curl -L -o .github/scripts/claude_review.py \
            "https://raw.githubusercontent.com/${{ inputs.script_repo }}/${{ inputs.script_ref }}/.github/scripts/claude_review.py"
          chmod +x .github/scripts/claude_review.py
          echo "📚 Downloading aip-review skill from ${{ inputs.script_repo }}@${{ inputs.script_ref }}"
          curl -L -o .claude/skills/aip-review/SKILL.md \
            "https://raw.githubusercontent.com/${{ inputs.script_repo }}/${{ inputs.script_ref }}/.claude/skills/aip-review/SKILL.md"
      
      - name: Review PR with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python .github/scripts/claude_review.py